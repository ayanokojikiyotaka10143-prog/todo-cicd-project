name: GitHub Projects Automation

on:
  pull_request:
    types: [closed]

jobs:
  move-issue-to-done:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Move linked issues to Done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Pull request merged. Moving linked issues to Done..."
          PR_BODY="${{ github.event.pull_request.body }}"
          ISSUES=$(echo "$PR_BODY" | grep -oP '(?:Closes|Fixes|Resolves)\s+#\K\d+' || true)
          if [ -z "$ISSUES" ]; then
            echo "No linked issues found."
            exit 0
          fi
          for ISSUE in $ISSUES; do
            echo "Processing issue #$ISSUE..."
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE/labels" \
              -d '{"labels":["done"]}'
            echo "Issue #$ISSUE labeled as done."
          done
